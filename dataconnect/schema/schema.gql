type User @table {
  displayName: String!
  email: String!
  role: String!
  createdAt: Timestamp!
  photoUrl: String
  bio: String
  learningGoals: [String]
  teachingSubjects: [String]
}

type Course @table {
  name: String!
  description: String!
  createdAt: Timestamp!
  educator: User
  syllabusUrl: String
  startDate: Date
  endDate: Date
}

type Module @table {
  title: String!
  description: String!
  orderIndex: Int!
  createdAt: Timestamp!
  course: Course
  estimatedCompletionTime: Int
}

type Assignment @table {
  title: String!
  description: String!
  type: String!
  dueDate: Timestamp!
  createdAt: Timestamp!
  module: Module
  course: Course
  maxScore: Int
  instructionsUrl: String
}

type Enrollment @table(key: ["student", "course"]) {
  enrollmentDate: Timestamp!
  status: String!
  student: User!
  course: Course!
  completionDate: Timestamp
  finalGrade: Float
}

type AIInteraction @table {
  type: String!
  query: String!
  response: String!
  createdAt: Timestamp!
  user: User
  module: Module
  assignment: Assignment
  course: Course
  feedbackRating: Int
  associatedContentId: UUID
}